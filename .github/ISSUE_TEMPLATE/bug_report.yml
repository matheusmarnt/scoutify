name: Bug Report
description: File a bug report
labels: ['bug']
body:
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 1.2.3"
    validations:
      required: true

  - type: input
    id: php
    attributes:
      label: PHP version
      placeholder: "e.g. 8.3"
    validations:
      required: true

  - type: input
    id: laravel
    attributes:
      label: Laravel version
      placeholder: "e.g. 11.x"
    validations:
      required: true

  - type: input
    id: livewire
    attributes:
      label: Livewire version
      placeholder: "e.g. 3.x or 4.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
