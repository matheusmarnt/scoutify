name: Dependabot Auto-merge

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
  workflow_run:
    workflows: ["tests"]
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  # GitHub Actions bumps don't touch PHP files → tests never run → merge directly
  merge-actions-bump:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target' &&
      github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve and merge GitHub Actions bumps
        if: steps.metadata.outputs.package-ecosystem == 'github-actions'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --squash "$PR_URL"

  # Composer/npm bumps touch PHP/composer files → tests run → merge after green
  merge-after-tests:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    steps:
      - name: Find open dependabot PR
        id: pr
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
            });
            return prs.length > 0 ? String(prs[0].number) : '';

      - name: Approve and merge
        if: steps.pr.outputs.result != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh pr review ${{ steps.pr.outputs.result }} --approve --repo "$REPO"
          gh pr merge ${{ steps.pr.outputs.result }} --squash --repo "$REPO"
