# Generated by scoutify:install.
# Include alongside your existing compose file:
#   docker compose -f compose.yaml -f compose.scoutify.yaml up -d
#
# Also add `meilisearch` to your app service's depends_on in compose.yaml.
services:
  meilisearch:
    image: 'getmeili/meilisearch:latest'
    ports:
      - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    environment:
      MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
      MEILI_MASTER_KEY: '${MEILISEARCH_KEY:-}'
    volumes:
      - 'scoutify-meilisearch:/meili_data'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:7700/health']
      retries: 3
      timeout: 5s

volumes:
  scoutify-meilisearch:
    driver: local
