# Generated by scoutify:install. Include via:
# docker compose -f docker-compose.yml -f docker-compose.scoutify.yml up -d
services:
    typesense:
        image: 'typesense/typesense:latest'
        ports:
            - '${FORWARD_TYPESENSE_PORT:-8108}:8108'
        environment:
            TYPESENSE_DATA_DIR: '/data'
            TYPESENSE_API_KEY: '${TYPESENSE_API_KEY:-xyz}'
            TYPESENSE_ENABLE_CORS: 'true'
        volumes:
            - 'scoutify-typesense:/data'
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:8108/health']
            retries: 3
            timeout: 5s
volumes:
    scoutify-typesense:
        driver: local
