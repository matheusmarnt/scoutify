# Generated by scoutify:install.
# Include alongside your existing compose file:
#   docker compose -f compose.yaml -f compose.scoutify.yaml up -d
#
# Also add `typesense` to your app service's depends_on in compose.yaml.
services:
  typesense:
    image: 'typesense/typesense:latest'
    ports:
      - '${FORWARD_TYPESENSE_PORT:-8108}:8108'
    environment:
      TYPESENSE_DATA_DIR: '/data'
      TYPESENSE_API_KEY: '${TYPESENSE_API_KEY:-xyz}'
      TYPESENSE_ENABLE_CORS: 'true'
    volumes:
      - 'scoutify-typesense:/data'
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--spider', 'http://localhost:8108/health']
      retries: 3
      timeout: 5s

volumes:
  scoutify-typesense:
    driver: local
